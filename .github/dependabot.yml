version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      mailkit:
        patterns:
          - "MailKit"
          - "MimeKit"
      test-dependencies:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "NSubstitute"
          - "coverlet*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
