name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        run: dotnet restore
      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['10.x', '9.x', '8.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
      - name: Test (unit only)
        run: |
          dotnet test tests/ --no-build --configuration Release \
            --filter "Category!=Integration" \
            --framework net${{ matrix.dotnet == '10.x' && '10.0' || matrix.dotnet == '9.x' && '9.0' || '8.0' }} \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
      - uses: codecov/codecov-action@v4
        if: matrix.dotnet == '10.x'
        with:
          directory: ./coverage
